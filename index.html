<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clavier Phonétique Français</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; padding: 15px;
}
h1 { text-align: center; color: white; padding: 15px; font-size: 1.4em; }
.app { max-width: 800px; margin: 0 auto; }
.display-box {
  background: white; border-radius: 15px;
  padding: 20px; margin-bottom: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.word-screen {
  font-size: 2.8em; font-weight: bold; color: #2c3e50;
  letter-spacing: 8px; min-height: 70px; padding: 10px;
  border-bottom: 3px solid #3498db; margin-bottom: 15px;
  word-break: break-all; text-align: center;
}
.cursor { animation: blink 1s infinite; color: #3498db; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.btn {
  padding: 12px 18px; border: none; border-radius: 10px;
  font-size: 1em; font-weight: bold; cursor: pointer; transition: all 0.1s;
}
.btn:active { transform: scale(0.95); }
.btn-mic    { background: #27ae60; color: white; }
.btn-mic.on { background: #e74c3c; animation: pulse 1s infinite; }
.btn-del    { background: #e74c3c; color: white; }
.btn-clear  { background: #95a5a6; color: white; }
.btn-add    { background: #f39c12; color: white; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
.mic-status { text-align: center; color: #e74c3c; font-size: 0.85em; margin-top: 8px; min-height: 20px; }
.suggestions-box {
  background: white; border-radius: 15px;
  padding: 15px; margin-bottom: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  min-height: 100px;
}
.suggestions-titre {
  text-align: center; font-weight: bold; color: #7f8c8d;
  font-size: 0.9em; margin-bottom: 10px;
}
.suggestions-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
.card {
  background: #f8f9fa; border-radius: 12px; padding: 12px 16px;
  cursor: pointer; border: 2px solid transparent;
  text-align: center; transition: all 0.2s; min-width: 90px;
}
.card:hover { border-color: #3498db; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
.card:active { transform: scale(0.95); }
.card .em  { font-size: 2em; display: block; }
.card .wrd { font-weight: bold; color: #2c3e50; font-size: 1em; margin-top: 4px; }
.card .lvl { font-size: 0.7em; background: #3498db; color: white; border-radius: 8px; padding: 2px 6px; display: inline-block; margin-top: 3px; }
.no-result { text-align: center; color: #bdc3c7; padding: 20px; font-style: italic; }
.keyboard { background: #2c3e50; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
.row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }
.k {
  height: 60px; width: 66px;
  background: white; border: none; border-radius: 8px;
  font-size: 1.3em; font-weight: bold; color: #2c3e50;
  cursor: pointer; box-shadow: 0 4px 0 #aaa; transition: all 0.1s;
  display: flex; align-items: center; justify-content: center;
}
.k:hover  { background: #3498db; color: white; box-shadow: 0 4px 0 #2178a8; }
.k:active { transform: translateY(3px); box-shadow: 0 1px 0 #aaa; }
.k.accent { background: #ffeaa7; font-size: 1.1em; }
.k.accent:hover { background: #fdcb6e; color: #2c3e50; }
.k.wide  { width: 100px; font-size: 1em; }
.k.space { width: 280px; font-size: 0.85em; color: #888; background: #ecf0f1; }
.counter { text-align: center; color: rgba(255,255,255,0.8); font-size: 0.85em; padding: 5px; }
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 999;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: white; border-radius: 20px;
  padding: 30px; width: 90%; max-width: 380px; text-align: center;
}
.modal-box h2 { margin-bottom: 20px; color: #2c3e50; }
.champ {
  width: 100%; padding: 12px; margin-bottom: 12px;
  border: 2px solid #ddd; border-radius: 10px;
  font-size: 1em; outline: none;
}
.champ:focus { border-color: #3498db; }
.modal-box .btn { width: 100%; margin-bottom: 8px; padding: 14px; font-size: 1em; }
.btn-valider { background: #27ae60; color: white; }
.btn-annuler { background: #ecf0f1; color: #555; }
.modal-mot-box {
  background: white; border-radius: 20px;
  padding: 30px; width: 90%; max-width: 320px; text-align: center;
}
.grand-emoji { font-size: 5em; }
.grand-mot   { font-size: 2.5em; font-weight: bold; color: #2c3e50; margin: 10px 0; }
.grand-phon  { color: #7f8c8d; margin-bottom: 20px; font-size: 1.1em; }
.btn-ecouter { background: #3498db; color: white; }
.btn-fermer  { background: #ecf0f1; color: #555; }
</style>
</head>
<body>
<div class="app">
  <h1>🔤 Clavier Phonétique Français</h1>

    </div>
  </div>

  <div class="suggestions-box">
    <div class="suggestions-titre" id="sugTitre">💡 Commence à taper pour voir les suggestions...</div>
    <div class="suggestions-grid"  id="sugGrid"></div>
  </div>

  <div class="keyboard">
    <div class="row">
      <button class="k" onclick="add('a')">A</button>
      <button class="k" onclick="add('z')">Z</button>
      <button class="k" onclick="add('e')">E</button>
      <button class="k" onclick="add('r')">R</button>
      <button class="k" onclick="add('t')">T</button>
      <button class="k" onclick="add('y')">Y</button>
      <button class="k" onclick="add('u')">U</button>
      <button class="k" onclick="add('i')">I</button>
      <button class="k" onclick="add('o')">O</button>
      <button class="k" onclick="add('p')">P</button>
    </div>
    <div class="row">
      <button class="k" onclick="add('q')">Q</button>
      <button class="k" onclick="add('s')">S</button>
      <button class="k" onclick="add('d')">D</button>
      <button class="k" onclick="add('f')">F</button>
      <button class="k" onclick="add('g')">G</button>
      <button class="k" onclick="add('h')">H</button>
      <button class="k" onclick="add('j')">J</button>
      <button class="k" onclick="add('k')">K</button>
      <button class="k" onclick="add('l')">L</button>
      <button class="k" onclick="add('m')">M</button>
    </div>
    <div class="row">
      <button class="k wide" onclick="delLetter()">⌫ Eff.</button>
      <button class="k" onclick="add('w')">W</button>
      <button class="k" onclick="add('x')">X</button>
      <button class="k" onclick="add('c')">C</button>
      <button class="k" onclick="add('v')">V</button>
      <button class="k" onclick="add('b')">B</button>
      <button class="k" onclick="add('n')">N</button>
      <button class="k wide" onclick="clearAll()">🗑️ Eff. tout</button>
    </div>
    <div class="row">
      <button class="k accent" onclick="add('é')">É</button>
      <button class="k accent" onclick="add('è')">È</button>
      <button class="k accent" onclick="add('ê')">Ê</button>
      <button class="k accent" onclick="add('à')">À</button>
      <button class="k accent" onclick="add('â')">Â</button>
      <button class="k accent" onclick="add('ù')">Ù</button>
      <button class="k accent" onclick="add('û')">Û</button>
      <button class="k accent" onclick="add('ô')">Ô</button>
      <button class="k accent" onclick="add('î')">Î</button>
      <button class="k accent" onclick="add('ç')">Ç</button>
    </div>
    <div class="row">
      <button class="k space" onclick="add(' ')">espace</button>
    </div>
    <div class="counter" id="counter">⏳ Chargement...</div>
  </div>
</div>

<!-- MODAL VOIR UN MOT -->
<div class="modal-bg" id="modalMot">
  <div class="modal-mot-box">
    <div class="grand-emoji" id="mE"></div>
    <div class="grand-mot"   id="mM"></div>
    <div class="grand-phon"  id="mP"></div>
    <div style="display:flex; gap:10px; flex-direction:column">
      <button class="btn btn-ecouter" onclick="ecouter()">🔊 Écouter le mot</button>
      <button class="btn btn-fermer"  onclick="fermerMot()">✕ Fermer</button>
    </div>
  </div>
</div>

<!-- MODAL AJOUTER UN MOT -->
<div class="modal-bg" id="modalAjout">
  <div class="modal-box">
    <h2>➕ Ajouter un mot</h2>
    <input class="champ" id="aMot"   placeholder="Mot à ajouter (ex: papillon)" />
    <input class="champ" id="aPhon"  placeholder="Comment ça sonne ? (ex: papion)" />
    <input class="champ" id="aEmoji" placeholder="Emoji (ex: 🦋)" />
    <button class="btn btn-valider" onclick="validerAjout()">✅ Ajouter à ma liste</button>
    <button class="btn btn-annuler" onclick="fermerAjout()">Annuler</button>
  </div>
</div>

var banque = words.slice();

try {
  var extras = JSON.parse(localStorage.getItem('mots_extra') || '[]');
  extras.forEach(function(m) { banque.push(m); });
} catch(e) {}

  '📚 ' + banque.length + ' mots disponibles ✅';

var typed = '';
var motActuel = '';
var micOn = false;
var recog = null;

function updateScreen() {
  var s = document.getElementById('screen');
  s.innerHTML = typed
    ? typed.toUpperCase() + '<span class="cursor">|</span>'
    : '<span class="cursor">|</span>';
}

function add(l)      { typed += l;           updateScreen(); predire(); }
function delLetter() { typed = typed.slice(0,-1); updateScreen(); predire(); }
function clearAll()  { typed = '';           updateScreen(); predire(); }

document.addEventListener('keydown', function(e) {
  if (document.querySelector('.modal-bg.open')) return;
  if (e.key === 'Backspace') { e.preventDefault(); delLetter(); }
  else if (e.key === 'Escape') { clearAll(); }
  else if (/^[a-zA-ZàâäéèêëîïôùûüçÀÂÄÉÈÊËÎÏÔÙÛÜÇ ]$/.test(e.key)) {
    add(e.key.toLowerCase());
  }
});

function norm(t) {
  if (!t) return '';
  return t.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/ph/g,'f')
    .replace(/eau|au/g,'o')
    .replace(/ou/g,'u')
    .replace(/ch/g,'j')
    .replace(/ain|ein|in|im/g,'in')
    .replace(/an|en|am|em/g,'an')
    .replace(/on|om/g,'on')
    .replace(/gn/g,'ny')
    .replace(/qu/g,'k')
    .replace(/[szxtd]$/g,'');
}

function scorer(saisie, mot) {
  var s  = norm(saisie);
  var mw = norm(mot.w || '');
  var mp = norm(mot.p || '');
  if (mw === s)          return 100;
  if (mw.startsWith(s))  return 90;
  if (mp === s)          return 85;
  if (mp.startsWith(s))  return 80;
  if (mw.includes(s))    return 50;
  if (mp.includes(s))    return 45;
  var c = 0;
  for (var i = 0; i < Math.min(s.length, mw.length); i++) {
    if (s[i] === mw[i]) c++; else break;
  }
  if (c >= 2) return 20 + (c / s.length) * 30;
  return 0;
}

function predire() {
  var titre = document.getElementById('sugTitre');
  var grid  = document.getElementById('sugGrid');
  if (!typed.trim()) {
    titre.textContent = '💡 Commence à taper pour voir les suggestions...';
    grid.innerHTML = '';
    return;
  }
  var res = [];
  for (var i = 0; i < banque.length; i++) {
    var sc = scorer(typed.trim(), banque[i]);
    if (sc > 0) res.push({ m: banque[i], sc: sc });
  }
  res.sort(function(a,b){ return b.sc - a.sc; });
  res = res.slice(0, 24);
  if (res.length === 0) {
    titre.textContent = '😕 Aucun mot trouvé pour "' + typed + '"';
    grid.innerHTML = '<div class="no-result">Essaie autrement ou utilise ➕ pour ajouter ce mot !</div>';
    return;
  }
  titre.textContent = '✅ ' + res.length + ' suggestion(s) pour "' + typed + '"';
  var html = '';
  for (var j = 0; j < res.length; j++) {
    var m = res[j].m;
    html += '<div class="card" onclick="voirMot(' +
      JSON.stringify(m.w) + ',' +
      JSON.stringify(m.e || '📖') + ',' +
      JSON.stringify(m.p || '') + ')">' +
      '<span class="em">' + (m.e || '📖') + '</span>' +
      '<div class="wrd">' + m.w + '</div>' +
      '<span class="lvl">' + (m.n || 'P1') + '</span>' +
      '</div>';
  }
  grid.innerHTML = html;
}

function voirMot(mot, emoji, phon) {
  motActuel = mot;
  document.getElementById('mE').textContent = emoji;
  document.getElementById('mM').textContent = mot;
  document.getElementById('mP').textContent = phon ? '[ ' + phon + ' ]' : '';
  document.getElementById('modalMot').classList.add('open');
  setTimeout(ecouter, 400);
}

function fermerMot() {
  document.getElementById('modalMot').classList.remove('open');
  speechSynthesis.cancel();
}

function ecouter() {
  if (!motActuel) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(motActuel);
  u.lang = 'fr-FR'; u.rate = 0.8;
  speechSynthesis.speak(u);
}

document.getElementById('modalMot').addEventListener('click', function(e) {
  if (e.target === this) fermerMot();
});

function toggleMic() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Dictée vocale disponible uniquement sur Chrome ou Edge.'); return; }
  if (micOn) { recog && recog.stop(); return; }
  recog = new SR();
  recog.lang = 'fr-FR';
  recog.continuous = false;
  recog.interimResults = false;
  recog.onstart = function() {
    micOn = true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('micBtn').textContent = '🔴 En écoute...';
    document.getElementById('micStatus').textContent = '🎤 Parlez maintenant...';
  };
  recog.onresult = function(e) {
    typed = e.results[0][0].transcript.toLowerCase().replace(/\s+/g,'');
    updateScreen(); predire();
  };
  recog.onerror = function(e) {
    document.getElementById('micStatus').textContent = '❌ Erreur : ' + e.error;
  };
  recog.onend = function() {
    micOn = false;
    document.getElementById('micBtn').classList.remove('on');
    document.getElementById('micBtn').textContent = '🎤 Dicter';
    document.getElementById('micStatus').textContent = '';
  };
  recog.start();
}

function ouvrirAjout() {
  document.getElementById('aMot').value   = typed;
  document.getElementById('aPhon').value  = '';
  document.getElementById('aEmoji').value = '';
  document.getElementById('modalAjout').classList.add('open');
}
function fermerAjout() {
  document.getElementById('modalAjout').classList.remove('open');
}
document.getElementById('modalAjout').addEventListener('click', function(e) {
  if (e.target === this) fermerAjout();
});
function validerAjout() {
  var mot = document.getElementById('aMot').value.trim();
  if (!mot) { alert('Entre un mot !'); return; }
  var nouveau = {
    w: mot,
    p: document.getElementById('aPhon').value.trim(),
    e: document.getElementById('aEmoji').value.trim() || '📖',
    n: 'perso'
  };
  banque.push(nouveau);
  try {
    var extras = JSON.parse(localStorage.getItem('mots_extra') || '[]');
    extras.push(nouveau);
    localStorage.setItem('mots_extra', JSON.stringify(extras));
  } catch(e) {}
  fermerAjout();
  predire();
  document.getElementById('counter').textContent = '📚 ' + banque.length + ' mots disponibles';
  alert('✅ "' + mot + '" ajouté à votre liste !');
}

updateScreen();
predire();
</script>
</body>
</html>
