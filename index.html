<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clavier Prédictif</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Arial', sans-serif;
  background: #000;
  min-height: 100vh;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: #e94560;
  font-size: 1.8em;
  text-align: center;
  margin-bottom: 15px;
  text-shadow: 0 0 20px rgba(233,69,96,0.8);
  letter-spacing: 3px;
}

#app {
  width: 100%;
  max-width: 620px;
}

#screen-wrap {
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(233,69,96,0.5);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 12px;
  box-shadow: 0 0 30px rgba(233,69,96,0.2), inset 0 0 30px rgba(0,0,0,0.5);
}

#screen {
  font-size: 2.2em;
  text-align: center;
  min-height: 60px;
  color: #fff;
  letter-spacing: 6px;
  text-shadow: 0 0 15px rgba(255,255,255,0.5);
  word-break: break-all;
}

#screen-hint {
  text-align: center;
  color: rgba(255,255,255,0.25);
  font-size: 0.8em;
  margin-top: 5px;
}

#suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  min-height: 55px;
  padding: 5px;
}

.suggestion {
  background: linear-gradient(135deg, #e94560, #c23152);
  border: none;
  border-radius: 25px;
  padding: 8px 14px;
  color: white;
  font-size: 0.95em;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(233,69,96,0.5);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.suggestion:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(233,69,96,0.8);
}

.suggestion .emoji { font-size: 1.2em; }
.suggestion .word { font-weight: bold; }

.speak-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-size: 0.85em;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  color: white;
}

.speak-btn:hover { background: rgba(255,255,255,0.4); }

#actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

#actions button {
  padding: 10px 18px;
  border: none;
  border-radius: 25px;
  font-size: 0.9em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

#btnSpeak { background: linear-gradient(135deg,#00d2ff,#0095ff); color:white; }
#btnMic   { background: linear-gradient(135deg,#ff6b6b,#ee5a24); color:white; }
#btnSave  { background: linear-gradient(135deg,#51cf66,#2f9e44); color:white; }
#btnClear { background: linear-gradient(135deg,#868e96,#495057); color:white; }
#actions button:hover { transform: translateY(-2px); }

#keyboard {
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.row {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-bottom: 6px;
}

.k {
  width: 52px;
  height: 52px;
  font-size: 1.3em;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#1a1a1a,#111);
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 0 #000, 0 5px 10px rgba(0,0,0,0.5);
  transition: all 0.1s;
  border: 1px solid rgba(255,255,255,0.08);
}

.k:hover {
  background: linear-gradient(135deg,#e94560,#c23152);
  box-shadow: 0 4px 0 #7a1a2a, 0 0 15px rgba(233,69,96,0.5);
}

.k:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #000;
}

.k-space {
  width: 200px;
  font-size: 0.9em;
  background: linear-gradient(135deg,#1a2a3a,#0d1a26);
  box-shadow: 0 4px 0 #000;
}

.k-space:hover {
  background: linear-gradient(135deg,#2a4a6a,#1a2a3a);
}

.k-del {
  width: 75px;
  font-size: 1em;
  background: linear-gradient(135deg,#3a0a0a,#200505);
  color: #ff6b6b;
  box-shadow: 0 4px 0 #000;
}

.k-del:hover {
  background: linear-gradient(135deg,#c0392b,#7a1a12);
  color: white;
}

.k-accent {
  background: linear-gradient(135deg,#1a0a2a,#0d0518);
  color: #c084fc;
  border-color: rgba(192,132,252,0.2);
}

.k-accent:hover {
  background: linear-gradient(135deg,#6c3483,#4a235a);
  color: white;
}

#msg {
  text-align: center;
  margin-top: 10px;
  font-size: 0.85em;
  min-height: 25px;
  color: rgba(255,255,255,0.5);
}

#modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  justify-content: center;
  align-items: center;
}

#modal.show { display: flex; }

#modal-box {
  background: #111;
  border: 2px solid #e94560;
  border-radius: 20px;
  padding: 25px;
  width: 90%;
  max-width: 380px;
  box-shadow: 0 0 60px rgba(233,69,96,0.4);
}

#modal-box h2 { color:#e94560; margin-bottom:15px; text-align:center; }

#modal-box input {
  width:100%;
  padding: 10px 15px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 1em;
  margin-bottom: 10px;
}

#modal-box input::placeholder { color: rgba(255,255,255,0.3); }

.modal-btns {
  display:flex; gap:10px;
  justify-content:center;
  margin-top:10px;
}

.modal-btns button {
  padding: 10px 25px;
  border: none;
  border-radius: 20px;
  font-size: 1em;
  cursor: pointer;
  font-weight: bold;
}

#btnModalOk     { background: linear-gradient(135deg,#51cf66,#2f9e44); color:white; }
#btnModalCancel { background: linear-gradient(135deg,#555,#333); color:white; }

#saved-words {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}

.saved-chip {
  background: rgba(255,255,255,0.06);
  border-radius: 15px;
  padding: 5px 12px;
  color: rgba(255,255,255,0.7);
  font-size: 0.85em;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.12);
  transition: all 0.2s;
}

.saved-chip:hover {
  background: rgba(233,69,96,0.25);
  border-color: #e94560;
}
</style>
</head>

    </div>
    <div class="row">

    </div>
  </div>

  <div id="saved-words"></div>
  <div id="msg"></div>
</div>

<!-- Modal -->
<div id="modal">

</div>

// ════════════════════════════════════════
var typed = '';
var motsAjoutes = JSON.parse(localStorage.getItem('motsAjoutes') || '[]');
var tousLesMots = mots.concat(motsAjoutes);

function majEcran() {
  document.getElementById('screen').textContent = typed.length ? typed : '_';
}

function afficherSuggestions() {
  var box = document.getElementById('suggestions');
  box.innerHTML = '';
  if (!typed.trim()) return;

  var q = typed.toLowerCase().trim();
  var resultats = tousLesMots.filter(function(m) {
    return m.w.toLowerCase().startsWith(q);
  }).slice(0, 8);

  resultats.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'suggestion';

    var spanE = document.createElement('span');
    spanE.className = 'emoji';
    spanE.textContent = m.e;

    var spanW = document.createElement('span');
    spanW.className = 'word';
    spanW.textContent = m.w;

    var spanS = document.createElement('button');
    spanS.className = 'speak-btn';
    spanS.textContent = '🔊';
    spanS.title = 'Écouter';
    spanS.addEventListener('click', function(e) {
      e.stopPropagation();
      parler(m.w);
    });

    btn.appendChild(spanE);
    btn.appendChild(spanW);
    btn.appendChild(spanS);

    btn.addEventListener('click', function() {
      typed = m.w + ' ';
      majEcran();
      afficherSuggestions();
    });

    box.appendChild(btn);
  });
}

function add(c) {
  typed += c;
  majEcran();
  afficherSuggestions();
}

function del() {
  typed = typed.slice(0, -1);
  majEcran();
  afficherSuggestions();
}

function parler(texte) {
  if (!texte.trim()) {
    document.getElementById('msg').textContent = '⚠️ Rien à lire';
    return;
  }
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(texte);
    u.lang = 'fr-FR';
    u.rate = 0.85;
    speechSynthesis.speak(u);
    document.getElementById('msg').textContent = '🔊 ' + texte;
  } else {
    document.getElementById('msg').textContent = '❌ Audio non supporté';
  }
}

function dicter() {
  var R = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!R) {
    document.getElementById('msg').textContent = '❌ Micro non supporté';
    return;
  }
  var r = new R();
  r.lang = 'fr-FR';
  r.onstart = function() {
    document.getElementById('msg').textContent = '🎤 Parlez...';
  };
  r.onresult = function(e) {
    typed = e.results[0][0].transcript;
    majEcran();
    afficherSuggestions();
    document.getElementById('msg').textContent = '✅ Entendu !';
  };
  r.onerror = function() {
    document.getElementById('msg').textContent = '❌ Erreur micro';
  };
  r.start();
}

function ouvrirModal() {
  if (!typed.trim()) {
    document.getElementById('msg').textContent = '⚠️ Tapez un mot d\'abord';
    return;
  }
  document.getElementById('modal-word').textContent = typed.trim();
  document.getElementById('modal-emoji').value = '';
  document.getElementById('modal').classList.add('show');
}

function fermerModal() {
  document.getElementById('modal').classList.remove('show');
}

function sauvegarder() {
  var mot = typed.trim();
  var emoji = document.getElementById('modal-emoji').value.trim() || '📝';
  var nouveau = { w: mot, e: emoji, n: 'P1' };
  motsAjoutes.push(nouveau);
  tousLesMots.push(nouveau);
  localStorage.setItem('motsAjoutes', JSON.stringify(motsAjoutes));
  fermerModal();
  afficherMotsSauvegardes();
  document.getElementById('msg').textContent = '✅ "' + mot + '" enregistré !';
}

function afficherMotsSauvegardes() {
  var box = document.getElementById('saved-words');
  box.innerHTML = '';
  if (motsAjoutes.length === 0) return;

  var titre = document.createElement('p');
  titre.style.cssText = 'color:rgba(255,255,255,0.4);font-size:0.8em;width:100%;text-align:center;margin-bottom:5px;margin-top:10px;';
  titre.textContent = '💾 Mes mots enregistrés :';
  box.appendChild(titre);

  motsAjoutes.forEach(function(m) {
    var chip = document.createElement('span');
    chip.className = 'saved-chip';
    chip.textContent = m.e + ' ' + m.w;
    chip.addEventListener('click', function() {
      typed = m.w + ' ';
      majEcran();
      afficherSuggestions();
    });
    box.appendChild(chip);
  });
}

document.getElementById('btnSpeak').addEventListener('click', function() { parler(typed); });
document.getElementById('btnMic').addEventListener('click', dicter);
document.getElementById('btnSave').addEventListener('click', ouvrirModal);
document.getElementById('btnClear').addEventListener('click', function() {
  typed = '';
  majEcran();
  afficherSuggestions();
  document.getElementById('msg').textContent = '';
});
document.getElementById('btnModalOk').addEventListener('click', sauvegarder);
document.getElementById('btnModalCancel').addEventListener('click', fermerModal);
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fermerModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Backspace') { e.preventDefault(); del(); }
  else if (e.key === 'Escape') { typed = ''; majEcran(); afficherSuggestions(); }
  else if (e.key === ' ') { e.preventDefault(); add(' '); }
  else if (/^[a-zA-ZàâäéèêëîïôùûüçÀÂÄÉÈÊËÎÏÔÙÛÜÇ]$/.test(e.key)) {
    add(e.key.toLowerCase());
  }
});

afficherMotsSauvegardes();
majEcran();
</script>
