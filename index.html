<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clavier Phonétique Français</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Arial Rounded MT Bold', Arial, sans-serif; 
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh; padding: 15px;
}

h1 { 
  text-align: center; color: white; 
  padding: 15px; font-size: 1.6em;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.app-container {
  max-width: 800px; margin: 0 auto;
}

/* ZONE D'AFFICHAGE MOT */
.word-display {
  background: white; border-radius: 15px;
  padding: 20px; margin-bottom: 15px;
  text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.word-typed {
  font-size: 2.5em; font-weight: bold;
  color: #2c3e50; letter-spacing: 5px;
  min-height: 60px; padding: 10px;
  border-bottom: 3px solid #3498db;
  margin-bottom: 10px;
}
.word-hint { 
  color: #7f8c8d; font-size: 0.9em;
  margin-bottom: 10px;
}

/* BOUTONS ACTION */
.action-buttons {
  display: flex; gap: 10px; justify-content: center;
  flex-wrap: wrap; margin-top: 10px;
}
.btn-effacer {
  background: #e74c3c; color: white;
  border: none; padding: 10px 20px;
  border-radius: 10px; font-size: 1em;
  cursor: pointer; font-weight: bold;
}
.btn-effacer:hover { background: #c0392b; }
.btn-effacer-tout {
  background: #95a5a6; color: white;
  border: none; padding: 10px 20px;
  border-radius: 10px; font-size: 1em;
  cursor: pointer; font-weight: bold;
}
.btn-micro {
  background: #27ae60; color: white;
  border: none; padding: 10px 20px;
  border-radius: 10px; font-size: 1em;
  cursor: pointer; font-weight: bold;
}
.btn-micro.active { background: #e74c3c; animation: pulse 1s infinite; }
.btn-chercher {
  background: #3498db; color: white;
  border: none; padding: 10px 25px;
  border-radius: 10px; font-size: 1em;
  cursor: pointer; font-weight: bold;
}
.btn-chercher:hover { background: #2980b9; }

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* CLAVIER AZERTY */
.keyboard-container {
  background: #2c3e50; border-radius: 15px;
  padding: 15px; margin-bottom: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.keyboard-row {
  display: flex; justify-content: center;
  gap: 6px; margin-bottom: 6px;
}
.key {
  background: white; border: none;
  border-radius: 8px; padding: 0;
  width: 58px; height: 55px;
  font-size: 1.1em; font-weight: bold;
  cursor: pointer; color: #2c3e50;
  box-shadow: 0 4px 0 #bdc3c7;
  transition: all 0.1s;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.key:hover { background: #3498db; color: white; }
.key:active { 
  transform: translateY(3px); 
  box-shadow: 0 1px 0 #bdc3c7;
}
.key .top-char { font-size: 0.65em; color: #e74c3c; height: 14px; }
.key .main-char { font-size: 1.1em; }
.key-wide { width: 85px; }
.key-space { 
  width: 280px; background: #ecf0f1;
  font-size: 0.8em; color: #7f8c8d;
}
.key-accent {
  background: #ffeaa7; color: #2c3e50;
}
.key-accent:hover { background: #fdcb6e; color: #2c3e50; }

/* RÉSULTATS */
.results-container {
  background: white; border-radius: 15px;
  padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.results-title {
  font-size: 1.1em; color: #2c3e50;
  font-weight: bold; margin-bottom: 10px;
  text-align: center;
}
.results-grid {
  display: flex; flex-wrap: wrap;
  gap: 8px; justify-content: center;
}
.word-card {
  background: #f8f9fa; border-radius: 10px;
  padding: 12px 18px; cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s; text-align: center;
}
.word-card:hover { 
  border-color: #3498db; 
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(52,152,219,0.3);
}
.word-card .emoji { font-size: 1.8em; display: block; }
.word-card .w { font-size: 1em; font-weight: bold; color: #2c3e50; }
.word-card .niveau { 
  font-size: 0.7em; color: white;
  background: #3498db; border-radius: 10px;
  padding: 1px 6px; margin-top: 3px;
  display: inline-block;
}
.no-result { 
  text-align: center; color: #e74c3c;
  padding: 20px; font-size: 1em; width: 100%;
}

.status-bar {
  text-align: center; color: rgba(255,255,255,0.8);
  font-size: 0.85em; margin-bottom: 10px;
}
</style>
</head>
