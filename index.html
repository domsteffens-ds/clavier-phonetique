<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clavier Phonétique</title>
<script src="words.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: 0 auto;
}

h1 {
  text-align: center;
  color: white;
  font-size: 1.8em;
  margin-bottom: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

/* ── ÉCRAN DE SAISIE ── */
.screen {
  background: white;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 15px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 70px;
}

#display {
  flex: 1;
  font-size: 2em;
  color: #333;
  letter-spacing: 3px;
  min-height: 40px;
}

#display.empty::before {
  content: 'Tape un mot...';
  color: #bbb;
  font-size: 0.7em;
  letter-spacing: 1px;
}

.btn-mic {
  background: #e74c3c;
  color: white;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  font-size: 1.4em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-mic:hover { transform: scale(1.1); }
.btn-mic.active { animation: pulse 1s infinite; background: #c0392b; }

.btn-clear {
  background: #95a5a6;
  color: white;
  border: none;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  font-size: 1.2em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-clear:hover { transform: scale(1.1); }

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* ── RÉSULTATS ── */
.results {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  min-height: 80px;
}

.results-title {
  font-size: 0.85em;
  color: #999;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.words-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.word-card {
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: white;
  border: none;
  border-radius: 15px;
  padding: 12px 20px;
  font-size: 1.2em;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(240,147,251,0.4);
  display: flex;
  align-items: center;
  gap: 8px;
}

.word-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(240,147,251,0.6);
}

.word-card:active { transform: scale(0.95); }

.word-emoji { font-size: 1.4em; }

.no-result {
  color: #bbb;
  font-style: italic;
  padding: 10px;
}

/* ── CLAVIER VIRTUEL ── */
.keyboard {
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 15px;
  backdrop-filter: blur(10px);
}

.key-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.key {
  background: white;
  border: none;
  border-radius: 10px;
  width: 52px;
  height: 52px;
  font-size: 1.1em;
  font-weight: bold;
  color: #444;
  cursor: pointer;
  box-shadow: 0 4px 0 #ccc;
  transition: all 0.1s;
  touch-action: manipulation;
}

.key:hover { background: #f0f0f0; }
.key:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #ccc;
}

.key-special {
  background: #e8e8e8;
  width: auto;
  padding: 0 16px;
  font-size: 0.9em;
}

/* ── MODAL MOT ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: white;
  border-radius: 25px;
  padding: 40px;
  text-align: center;
  max-width: 350px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: popIn 0.3s ease;
}

@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

.modal-emoji { font-size: 5em; margin-bottom: 15px; }

.modal-word {
  font-size: 2.5em;
  font-weight: bold;
  color: #333;
  margin-bottom: 10px;
}

.modal-phonetic {
  color: #999;
  font-size: 1.1em;
  margin-bottom: 20px;
}

.btn-speak {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 15px 35px;
  font-size: 1.2em;
  cursor: pointer;
  margin-bottom: 15px;
  width: 100%;
  transition: all 0.2s;
}
.btn-speak:hover { transform: scale(1.05); }

.btn-close {
  background: #eee;
  color: #666;
  border: none;
  border-radius: 50px;
  padding: 10px 30px;
  font-size: 1em;
  cursor: pointer;
  width: 100%;
}
.btn-close:hover { background: #ddd; }

</style>
</head>
<body>

<div class="container">
  <h1>🔤 Clavier Phonétique</h1>

  <!-- Écran de saisie -->
  <div class="screen">
    <div id="display" class="empty"></div>
    <button class="btn-mic" id="btnMic" onclick="toggleMic()" title="Dicter">🎤</button>
    <button class="btn-clear" onclick="clearAll()" title="Effacer">✕</button>
  </div>

  <!-- Résultats -->
  <div class="results">
    <div class="results-title">📖 Mots suggérés</div>
    <div class="words-list" id="wordsList">
      <span class="no-result">Commence à taper pour voir des suggestions...</span>
    </div>
  </div>

  <!-- Clavier virtuel -->
  <div class="keyboard">
    <div class="key-row">
      <button class="key" onclick="add('a')">a</button>
      <button class="key" onclick="add('z')">z</button>
      <button class="key" onclick="add('e')">e</button>
      <button class="key" onclick="add('r')">r</button>
      <button class="key" onclick="add('t')">t</button>
      <button class="key" onclick="add('y')">y</button>
      <button class="key" onclick="add('u')">u</button>
      <button class="key" onclick="add('i')">i</button>
      <button class="key" onclick="add('o')">o</button>
      <button class="key" onclick="add('p')">p</button>
    </div>
    <div class="key-row">
      <button class="key" onclick="add('q')">q</button>
      <button class="key" onclick="add('s')">s</button>
      <button class="key" onclick="add('d')">d</button>
      <button class="key" onclick="add('f')">f</button>
      <button class="key" onclick="add('g')">g</button>
      <button class="key" onclick="add('h')">h</button>
      <button class="key" onclick="add('j')">j</button>
      <button class="key" onclick="add('k')">k</button>
      <button class="key" onclick="add('l')">l</button>
      <button class="key" onclick="add('m')">m</button>
    </div>
    <div class="key-row">
      <button class="key" onclick="add('w')">w</button>
      <button class="key" onclick="add('x')">x</button>
      <button class="key" onclick="add('c')">c</button>
      <button class="key" onclick="add('v')">v</button>
      <button class="key" onclick="add('b')">b</button>
      <button class="key" onclick="add('n')">n</button>
      <button class="key key-special" onclick="delLetter()">⌫</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-emoji" id="modalEmoji">🐱</div>
    <div class="modal-word" id="modalWord">chat</div>
    <div class="modal-phonetic" id="modalPhonetic"></div>
    <button class="btn-speak" onclick="speakWord()">🔊 Écouter</button>
    <button class="btn-close" onclick="closeModal()">Fermer</button>
  </div>
</div>

<script>
// ── VARIABLES ────────────────────────────────
let typed = '';
let currentWord = '';
let recognition = null;
let micActive = false;

// ── MOTEUR PHONÉTIQUE ─────────────────────────
function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/ph/g, 'f')
    .replace(/ch/g, 'x')
    .replace(/qu/g, 'k')
    .replace(/gn/g, 'n')
    .replace(/eau|au/g, 'o')
    .replace(/ei|ai|et/g, 'e')
    .replace(/ou/g, 'u')
    .replace(/oi/g, 'wa')
    .replace(/in|im|ain|ein/g, 'in')
    .replace(/an|am|en|em/g, 'an')
    .replace(/on|om/g, 'on')
    .replace(/ss|s/g, 's')
    .replace(/tt|t/g, 't')
    .replace(/[aeiouy]+/g, m => m[0])
    .replace(/([a-z])\1+/g, '$1');
}

function score(input, word) {
  const a = normalize(input);
  const b = normalize(word);
  if (b.startsWith(a)) return 100;
  if (b.includes(a)) return 80;
  let match = 0;
  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) match++;
    else break;
  }
  return Math.round((match / Math.max(a.length, b.length)) * 60);
}

// ── RECHERCHE ────────────────────────────────
function search() {
  const list = document.getElementById('wordsList');
  if (typed.length < 2) {
    list.innerHTML = '<span class="no-result">Commence à taper pour voir des suggestions...</span>';
    return;
  }

  const results = words
    .map(w => ({ ...w, score: score(typed, w.mot) }))
    .filter(w => w.score >= 40)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12);

  if (results.length === 0) {
    list.innerHTML = '<span class="no-result">Aucun mot trouvé... essaie autrement 🤔</span>';
    return;
  }

  list.innerHTML = results.map(w => `
    <button class="word-card" onclick="showWord('${w.mot}','${w.emoji || '📖'}')">
      <span class="word-emoji">${w.emoji || '📖'}</span>
      <span>${w.mot}</span>
    </button>
  `).join('');
}

// ── SAISIE ────────────────────────────────────
function add(letter) {
  typed += letter;
  updateDisplay();
  search();
}

function delLetter() {
  typed = typed.slice(0, -1);
  updateDisplay();
  search();
}

function clearAll() {
  typed = '';
  updateDisplay();
  search();
}

function updateDisplay() {
  const d = document.getElementById('display');
  d.textContent = typed;
  d.classList.toggle('empty', typed === '');
}

// ── CLAVIER PHYSIQUE ──────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Backspace') { e.preventDefault(); delLetter(); }
  else if (e.key === 'Escape') { clearAll(); }
  else if (/^[a-zA-ZÀ-ÿ]$/.test(e.key)) { add(e.key.toLowerCase()); }
});

// ── MODAL ─────────────────────────────────────
function showWord(mot, emoji) {
  currentWord = mot;
  document.getElementById('modalWord').textContent = mot;
  document.getElementById('modalEmoji').textContent = emoji;
  document.getElementById('modal').classList.add('open');
  speakWord();
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal') || e.target.classList.contains('btn-close')) {
    document.getElementById('modal').classList.remove('open');
  }
}

// ── SYNTHÈSE VOCALE ───────────────────────────
function speakWord() {
  if (!currentWord) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(currentWord);
  u.lang = 'fr-FR';
  u.rate = 0.8;
  speechSynthesis.speak(u);
}

// ── MICRO / DICTÉE ────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('La dictée n\'est pas disponible sur ce navigateur. Essayez Chrome.');
    return;
  }

  if (micActive) {
    recognition.stop();
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.interimResults = false;

  recognition.onstart = () => {
    micActive = true;
    document.getElementById('btnMic').classList.add('active');
  };

  recognition.onresult = (e) => {
    const heard = e.results[0][0].transcript.toLowerCase().trim();
    typed = heard;
    updateDisplay();
    search();
  };

  recognition.onend = () => {
    micActive = false;
    document.getElementById('btnMic').classList.remove('active');
  };

  recognition.start();
}
</script>
</body>
</html>
