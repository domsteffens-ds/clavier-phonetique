<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clavier Prédictif</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: #e94560;
  font-size: 1.8em;
  text-align: center;
  margin-bottom: 15px;
  text-shadow: 0 0 20px rgba(233,69,96,0.5);
  letter-spacing: 3px;
}

#app {
  width: 100%;
  max-width: 600px;
}

/* ÉCRAN */
#screen-wrap {
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(233,69,96,0.4);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 12px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(233,69,96,0.2);
}

#screen {
  font-size: 2.2em;
  text-align: center;
  min-height: 60px;
  color: #fff;
  letter-spacing: 6px;
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
  word-break: break-all;
}

#screen-hint {
  text-align: center;
  color: rgba(255,255,255,0.3);
  font-size: 0.85em;
  margin-top: 5px;
}

/* SUGGESTIONS */
#suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  min-height: 55px;
  padding: 5px;
}

.suggestion {
  background: linear-gradient(135deg, #e94560, #c23152);
  border: none;
  border-radius: 25px;
  padding: 8px 16px;
  color: white;
  font-size: 1em;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(233,69,96,0.4);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.suggestion:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(233,69,96,0.6);
}

.suggestion:active {
  transform: translateY(1px);
}

.suggestion .emoji { font-size: 1.2em; }
.suggestion .word { font-weight: bold; }
.suggestion .speak-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-size: 0.8em;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.suggestion .speak-btn:hover { background: rgba(255,255,255,0.4); }

/* BOUTONS ACTION */
#actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

#actions button {
  padding: 10px 20px;
  border: none;
  border-radius: 25px;
  font-size: 0.95em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

#btnSpeak {
  background: linear-gradient(135deg, #00d2ff, #0095ff);
  color: white;
}

#btnMic {
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: white;
}

#btnSave {
  background: linear-gradient(135deg, #51cf66, #2f9e44);
  color: white;
}

#btnClear {
  background: linear-gradient(135deg, #868e96, #495057);
  color: white;
}

#actions button:hover { transform: translateY(-2px); }
#actions button:active { transform: translateY(1px); }

/* CLAVIER */
#keyboard {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 12px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}

.row {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-bottom: 6px;
}

.k {
  width: 52px;
  height: 52px;
  font-size: 1.3em;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #2d3561, #1a1a4e);
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 0 #0d0d2b, 0 5px 10px rgba(0,0,0,0.3);
  transition: all 0.1s;
  border: 1px solid rgba(255,255,255,0.1);
}

.k:hover {
  background: linear-gradient(135deg, #e94560, #c23152);
  box-shadow: 0 4px 0 #7a1a2a, 0 0 15px rgba(233,69,96,0.4);
}

.k:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #0d0d2b;
}

.k-space {
  width: 200px;
  font-size: 0.9em;
  background: linear-gradient(135deg, #3d5a80, #2c4a6e);
  box-shadow: 0 4px 0 #1a2a40;
}

.k-space:hover {
  background: linear-gradient(135deg, #5a7fa8, #3d5a80);
}

.k-del {
  width: 75px;
  font-size: 1em;
  background: linear-gradient(135deg, #c0392b, #922b21);
  box-shadow: 0 4px 0 #5a1510;
}

.k-del:hover {
  background: linear-gradient(135deg, #e74c3c, #c0392b);
}

.k-accent {
  background: linear-gradient(135deg, #6c3483, #4a235a);
  box-shadow: 0 4px 0 #2d1436;
}

.k-accent:hover {
  background: linear-gradient(135deg, #9b59b6, #6c3483);
}

/* MESSAGE */
#msg {
  text-align: center;
  margin-top: 10px;
  font-size: 0.9em;
  min-height: 25px;
  color: rgba(255,255,255,0.6);
}

/* MODAL SAVE */
#modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  justify-content: center;
  align-items: center;
}

#modal.show { display: flex; }

#modal-box {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid #e94560;
  border-radius: 20px;
  padding: 25px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(233,69,96,0.3);
}

#modal-box h2 {
  color: #e94560;
  margin-bottom: 15px;
  text-align: center;
}

#modal-box input {
  width: 100%;
  padding: 10px 15px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 1em;
  margin-bottom: 10px;
}

#modal-box input::placeholder { color: rgba(255,255,255,0.4); }

.modal-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 10px;
}

.modal-btns button {
  padding: 10px 25px;
  border: none;
  border-radius: 20px;
  font-size: 1em;
  cursor: pointer;
  font-weight: bold;
}

#btnModalOk {
  background: linear-gradient(135deg, #51cf66, #2f9e44);
  color: white;
}

#btnModalCancel {
  background: linear-gradient(135deg, #868e96, #495057);
  color: white;
}

/* Mots sauvegardés */
#saved-words {
  margin-top: 15px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}

.saved-chip {
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 5px 12px;
  color: rgba(255,255,255,0.8);
  font-size: 0.85em;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.2);
  transition: all 0.2s;
}

.saved-chip:hover {
  background: rgba(233,69,96,0.3);
  border-color: #e94560;
}
</style>
</head>
<body>

<div id="app">
  <h1>⌨️ Clavier Prédictif</h1>

  <!-- Écran -->
  <div id="screen-wrap">
    <div id="screen">_</div>
    <div id="screen-hint">Tapez des lettres pour voir les suggestions</div>
  </div>

  <!-- Suggestions -->
  <div id="suggestions"></div>

  <!-- Boutons action -->
  <div id="actions">
    <button id="btnSpeak">🔊 Écouter</button>
    <button id="btnMic">🎤 Dicter</button>
    <button id="btnSave">💾 Enregistrer</button>
    <button id="btnClear">✖ Effacer</button>
  </div>

  <!-- Clavier AZERTY -->
  <div id="keyboard">
    <div class="row">
      <button class="k" onclick="add('a')">A</button>
      <button class="k" onclick="add('z')">Z</button>
      <button class="k" onclick="add('e')">E</button>
      <button class="k" onclick="add('r')">R</button>
      <button class="k" onclick="add('t')">T</button>
      <button class="k" onclick="add('y')">Y</button>
      <button class="k" onclick="add('u')">U</button>
      <button class="k" onclick="add('i')">I</button>
      <button class="k" onclick="add('o')">O</button>
      <button class="k" onclick="add('p')">P</button>
    </div>
    <div class="row">
      <button class="k" onclick="add('q')">Q</button>
      <button class="k" onclick="add('s')">S</button>
      <button class="k" onclick="add('d')">D</button>
      <button class="k" onclick="add('f')">F</button>
      <button class="k" onclick="add('g')">G</button>
      <button class="k" onclick="add('h')">H</button>
      <button class="k" onclick="add('j')">J</button>
      <button class="k" onclick="add('k')">K</button>
      <button class="k" onclick="add('l')">L</button>
      <button class="k" onclick="add('m')">M</button>
    </div>
    <div class="row">
      <button class="k" onclick="add('w')">W</button>
      <button class="k" onclick="add('x')">X</button>
      <button class="k" onclick="add('c')">C</button>
      <button class="k" onclick="add('v')">V</button>
      <button class="k" onclick="add('b')">B</button>
      <button class="k" onclick="add('n')">N</button>
      <button class="k k-del" onclick="del()">⌫</button>
    </div>
    <div class="row">
      <button class="k k-accent" onclick="add('é')">É</button>
      <button class="k k-accent" onclick="add('è')">È</button>
      <button class="k k-accent" onclick="add('ê')">Ê</button>
      <button class="k k-accent" onclick="add('à')">À</button>
      <button class="k k-accent" onclick="add('ù')">Ù</button>
      <button class="k k-accent" onclick="add('ç')">Ç</button>
      <button class="k k-accent" onclick="add('î')">Î</button>
      <button class="k k-accent" onclick="add('ô')">Ô</button>
    </div>
    <div class="row">
      <button class="k k-space" onclick="add(' ')">ESPACE</button>
    </div>
  </div>

  <!-- Mots sauvegardés -->
  <div id="saved-words"></div>

  <div id="msg"></div>
</div>

<!-- Modal enregistrer -->
<div id="modal">
  <div id="modal-box">
    <h2>💾 Enregistrer le mot</h2>
    <p style="color:rgba(255,255,255,0.6); margin-bottom:12px; text-align:center">
      Mot : <strong id="modal-word" style="color:#e94560"></strong>
    </p>
    <input type="text" id="modal-emoji" placeholder="Emoji (ex: 🌟)" maxlength="4">
    <div class="modal-btns">
      <button id="btnModalOk">✅ Sauvegarder</button>
      <button id="btnModalCancel">Annuler</button>
    </div>
  </div>
</div>

<script src="words.js"></script>
<script>
// ── Variables ──
var typed = '';
var motsAjoutes = JSON.parse(localStorage.getItem('motsAjoutes') || '[]');
var tousLesMots = mots.concat(motsAjoutes);

// ── Affichage écran ──
function majEcran() {
  var s = document.getElementById('screen');
  s.textContent = typed.length ? typed : '_';
}

// ── Suggestions ──
function afficherSuggestions() {
  var box = document.getElementById('suggestions');
  box.innerHTML = '';
  if (!typed.trim()) return;

  var q = typed.toLowerCase().replace(/\s+/g, '');
  var resultats = tousLesMots.filter(function(m) {
    return m.w.toLowerCase().replace(/\s+/g,'').startsWith(q);
  }).slice(0, 8);

  resultats.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'suggestion';
    btn.innerHTML =
      '<span class="emoji">' + m.e + '</span>' +
      '<span class="word">' + m.w + '</span>' +
      '<span class="speak-btn" title="Écouter">🔊</span>';

    // Clic sur le mot → insérer
    btn.addEventListener('click', function(e) {
      if (e.target.classList.contains('speak-btn')) {
        e.stopPropagation();
        parler(m.w);
        return;
      }
      typed = m.w + ' ';
      majEcran();
      afficherSuggestions();
    });

    box.appendChild(btn);
  });
}

// ── Clavier ──
function add(c) {
  typed += c;
  majEcran();
  afficherSuggestions();
}

function del() {
  typed = typed.slice(0, -1);
  majEcran();
  afficherSuggestions();
}

// ── Parler ──
function parler(texte) {
  if (!texte.trim()) {
    document.getElementById('msg').textContent = '⚠️ Rien à lire';
    return;
  }
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(texte);
    u.lang = 'fr-FR';
    u.rate = 0.9;
    speechSynthesis.speak(u);
    document.getElementById('msg').textContent = '🔊 Lecture : ' + texte;
  } else {
    document.getElementById('msg').textContent = '❌ Audio non supporté';
  }
}

// ── Micro ──
function dicter() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    document.getElementById('msg').textContent = '❌ Micro non supporté';
    return;
  }
  var R = window.SpeechRecognition || window.webkitSpeechRecognition;
  var r = new R();
  r.lang = 'fr-FR';
  r.onstart = function() {
    document.getElementById('msg').textContent = '🎤 Parlez maintenant...';
  };
  r.onresult = function(e) {
    typed = e.results[0][0].transcript;
    majEcran();
    afficherSuggestions();
    document.getElementById('msg').textContent = '✅ Entendu !';
  };
  r.onerror = function() {
    document.getElementById('msg').textContent = '❌ Erreur micro';
  };
  r.start();
}

// ── Modal Enregistrer ──
function ouvrirModal() {
  if (!typed.trim()) {
    document.getElementById('msg').textContent = '⚠️ Tapez un mot d\'abord';
    return;
  }
  document.getElementById('modal-word').textContent = typed.trim();
  document.getElementById('modal-emoji').value = '';
  document.getElementById('modal').classList.add('show');
}

function fermerModal() {
  document.getElementById('modal').classList.remove('show');
}

function sauvegarder() {
  var mot = typed.trim();
  var emoji = document.getElementById('modal-emoji').value.trim() || '📝';
  var nouveau = { w: mot, e: emoji, p: mot, n: 'P1' };
  motsAjoutes.push(nouveau);
  tousLesMots.push(nouveau);
  localStorage.setItem('motsAjoutes', JSON.stringify(motsAjoutes));
  fermerModal();
  afficherMotsSauvegardes();
  document.getElementById('msg').textContent = '✅ "' + mot + '" enregistré !';
}

// ── Mots sauvegardés ──
function afficherMotsSauvegardes() {
  var box = document.getElementById('saved-words');
  box.innerHTML = '';
  if (motsAjoutes.length === 0) return;

  var titre = document.createElement('p');
  titre.style.cssText = 'color:rgba(255,255,255,0.5);font-size:0.8em;width:100%;text-align:center;margin-bottom:5px;';
  titre.textContent = '💾 Mes mots enregistrés :';
  box.appendChild(titre);

  motsAjoutes.forEach(function(m, i) {
    var chip = document.createElement('span');
    chip.className = 'saved-chip';
    chip.textContent = m.e + ' ' + m.w;
    chip.title = 'Cliquer pour utiliser';
    chip.addEventListener('click', function() {
      typed = m.w + ' ';
      majEcran();
      afficherSuggestions();
    });
    box.appendChild(chip);
  });
}

// ── Événements boutons ──
document.getElementById('btnSpeak').addEventListener('click', function() {
  parler(typed);
});

document.getElementById('btnMic').addEventListener('click', dicter);

document.getElementById('btnSave').addEventListener('click', ouvrirModal);

document.getElementById('btnClear').addEventListener('click', function() {
  typed = '';
  majEcran();
  afficherSuggestions();
  document.getElementById('msg').textContent = '';
});

document.getElementById('btnModalOk').addEventListener('click', sauvegarder);
document.getElementById('btnModalCancel').addEventListener('click', fermerModal);

// Fermer modal en cliquant dehors
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fermerModal();
});

// ── Clavier physique ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Backspace') { e.preventDefault(); del(); }
  else if (e.key === 'Escape') {
    typed = '';
    majEcran();
    afficherSuggestions();
  } else if (e.key === ' ') {
    e.preventDefault();
    add(' ');
  } else if (/^[a-zA-ZàâäéèêëîïôùûüçÀÂÄÉÈÊËÎÏÔÙÛÜÇ]$/.test(e.key)) {
    add(e.key.toLowerCase());
  }
});

// ── Init ──
afficherMotsSauvegardes();
majEcran();
</script>
</body>
</html>
