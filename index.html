<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Clavier</title>
<style>
body { font-family: Arial; background: #667eea; padding: 20px; }
#screen {
  background: white; border-radius: 10px; padding: 20px;
  font-size: 2em; text-align: center; min-height: 80px;
  margin-bottom: 20px; letter-spacing: 5px;
}
.row { display: flex; justify-content: center; gap: 6px; margin-bottom: 6px; }
.k {
  width: 60px; height: 60px; font-size: 1.3em; font-weight: bold;
  border: none; border-radius: 8px; background: white;
  cursor: pointer; box-shadow: 0 4px 0 #aaa;
}
.k:active { transform: translateY(3px); box-shadow: 0 1px 0 #aaa; }
#status { color: white; text-align: center; font-size: 1.2em; margin-bottom: 15px; }
</style>
</head>
<body>

<div id="screen">|</div>
<div id="status">Cliquez une lettre ou tapez sur votre clavier !</div>

<div class="row">
  <button class="k" onclick="add('a')">A</button>
  <button class="k" onclick="add('z')">Z</button>
  <button class="k" onclick="add('e')">E</button>
  <button class="k" onclick="add('r')">R</button>
  <button class="k" onclick="add('t')">T</button>
  <button class="k" onclick="add('y')">Y</button>
  <button class="k" onclick="add('u')">U</button>
  <button class="k" onclick="add('i')">I</button>
  <button class="k" onclick="add('o')">O</button>
  <button class="k" onclick="add('p')">P</button>
</div>
<div class="row">
  <button class="k" onclick="add('q')">Q</button>
  <button class="k" onclick="add('s')">S</button>
  <button class="k" onclick="add('d')">D</button>
  <button class="k" onclick="add('f')">F</button>
  <button class="k" onclick="add('g')">G</button>
  <button class="k" onclick="add('h')">H</button>
  <button class="k" onclick="add('j')">J</button>
  <button class="k" onclick="add('k')">K</button>
  <button class="k" onclick="add('l')">L</button>
  <button class="k" onclick="add('m')">M</button>
</div>
<div class="row">
  <button class="k" onclick="del()" style="width:90px;font-size:1em">⌫ Eff</button>
  <button class="k" onclick="add('w')">W</button>
  <button class="k" onclick="add('x')">X</button>
  <button class="k" onclick="add('c')">C</button>
  <button class="k" onclick="add('v')">V</button>
  <button class="k" onclick="add('b')">B</button>
  <button class="k" onclick="add('n')">N</button>
  <button class="k" onclick="clear2()" style="width:90px;font-size:0.9em">🗑️ Tout</button>
</div>

<script>
var typed = '';

function add(l) {
  typed += l;
  document.getElementById('screen').textContent = typed || '|';
  document.getElementById('status').textContent = 'Tapé : ' + typed;
}

function del() {
  typed = typed.slice(0, -1);
  document.getElementById('screen').textContent = typed || '|';
  document.getElementById('status').textContent = 'Tapé : ' + typed;
}

function clear2() {
  typed = '';
  document.getElementById('screen').textContent = '|';
  document.getElementById('status').textContent = 'Effacé !';
}

// ✅ CLAVIER PHYSIQUE
document.addEventListener('keydown', function(e) {
  if (e.key === 'Backspace') {
    e.preventDefault();
    del();
  } else if (e.key === 'Escape') {
    clear2();
  } else if (/^[a-zA-ZàâäéèêëîïôùûüçÀÂÄÉÈÊËÎÏÔÙÛÜÇ]$/.test(e.key)) {
    add(e.key.toLowerCase());
  }
});
</script>
</body>
</html>
