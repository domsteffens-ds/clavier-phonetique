content = '''<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

.phonetique-label {

  color: #aaa;
  font-weight: normal;
}

/* ── CLAVIER VIRTUEL ── */
.keyboard-section {
  background: white;
  border-radius: 20px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

.keyboard-title {
  font-size: 0.8em;
  color: #999;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.keyboard-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
  justify-content: center;
}

.key {
  background: #f0f0f0;
  border: 2px solid #ddd;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 1.1em;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 42px;
  text-align: center;
  font-weight: bold;
  color: #333;
}
.key:hover { background: #667eea; color: white; border-color: #667eea; transform: scale(1.1); }
.key:active { transform: scale(0.95); }

.key-special {
  background: #e74c3c;
  color: white;
  border-color: #c0392b;
  font-size: 0.9em;
  padding: 10px 18px;
}
.key-special:hover { background: #c0392b; border-color: #c0392b; color: white; }

.key-space {
  background: #3498db;
  color: white;
  border-color: #2980b9;
  flex: 1;
  max-width: 200px;
}
.key-space:hover { background: #2980b9; border-color: #2980b9; color: white; }

/* ── MODAL ── */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal.open { display: flex; }

.modal-box {
  background: white;
  border-radius: 25px;
  padding: 40px;
  text-align: center;
  max-width: 350px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.modal-emoji { font-size: 4em; margin-bottom: 15px; }

.modal-word {
  font-size: 2.5em;
  font-weight: bold;
  color: #333;
  margin-bottom: 8px;
}

.modal-phonetique {
  font-size: 1.2em;
  color: #999;
  margin-bottom: 25px;
}

.btn-listen {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 15px;
  padding: 14px 30px;
  font-size: 1.1em;
  cursor: pointer;
  margin: 5px;
  transition: all 0.2s;
}
.btn-listen:hover { transform: scale(1.05); }

.btn-close {
  background: #ecf0f1;
  color: #666;
  border: none;
  border-radius: 15px;
  padding: 14px 30px;
  font-size: 1em;
  cursor: pointer;
  margin: 5px;
  transition: all 0.2s;
}
.btn-close:hover { background: #ddd; }

.no-result {
  color: #bbb;
  font-style: italic;
  padding: 10px 0;
}
</style>
</head>
<body>
<div class="container">
  <h1>⌨️ Clavier Phonétique</h1>

  <!-- Écran -->
  <div class="screen">
    <div id="display" class="empty"></div>
    <button class="btn-mic" id="btnMic" onclick="toggleMic()" title="Dicter">🎤</button>
    <button class="btn-clear" onclick="clearAll()" title="Effacer tout">✕</button>
  </div>

  <!-- Résultats -->
  <div class="results">
    <div class="results-title">📖 Suggestions</div>
    <div class="words-list" id="wordsList">
      <span class="no-result">Commence à taper pour voir les suggestions...</span>
    </div>
  </div>

  <!-- Clavier virtuel -->
  <div class="keyboard-section">
    <div class="keyboard-title">🖱️ Clavier virtuel</div>
    <div class="keyboard-row">
      <button class="key" onclick="add(\'a\')">a</button>
      <button class="key" onclick="add(\'z\')">z</button>
      <button class="key" onclick="add(\'e\')">e</button>
      <button class="key" onclick="add(\'r\')">r</button>
      <button class="key" onclick="add(\'t\')">t</button>
      <button class="key" onclick="add(\'y\')">y</button>
      <button class="key" onclick="add(\'u\')">u</button>
      <button class="key" onclick="add(\'i\')">i</button>
      <button class="key" onclick="add(\'o\')">o</button>
      <button class="key" onclick="add(\'p\')">p</button>
    </div>
    <div class="keyboard-row">
      <button class="key" onclick="add(\'q\')">q</button>
      <button class="key" onclick="add(\'s\')">s</button>
      <button class="key" onclick="add(\'d\')">d</button>
      <button class="key" onclick="add(\'f\')">f</button>
      <button class="key" onclick="add(\'g\')">g</button>
      <button class="key" onclick="add(\'h\')">h</button>
      <button class="key" onclick="add(\'j\')">j</button>
      <button class="key" onclick="add(\'k\')">k</button>
      <button class="key" onclick="add(\'l\')">l</button>
      <button class="key" onclick="add(\'m\')">m</button>
    </div>
    <div class="keyboard-row">
      <button class="key" onclick="add(\'w\')">w</button>
      <button class="key" onclick="add(\'x\')">x</button>
      <button class="key" onclick="add(\'c\')">c</button>
      <button class="key" onclick="add(\'v\')">v</button>
      <button class="key" onclick="add(\'b\')">b</button>
      <button class="key" onclick="add(\'n\')">n</button>
    </div>
    <div class="keyboard-row">
      <button class="key" onclick="add(\'é\')">é</button>
      <button class="key" onclick="add(\'è\')">è</button>
      <button class="key" onclick="add(\'ê\')">ê</button>
      <button class="key" onclick="add(\'à\')">à</button>
      <button class="key" onclick="add(\'â\')">â</button>
      <button class="key" onclick="add(\'ù\')">ù</button>
      <button class="key" onclick="add(\'û\')">û</button>
      <button class="key" onclick="add(\'î\')">î</button>
      <button class="key" onclick="add(\'ô\')">ô</button>
      <button class="key" onclick="add(\'ç\')">ç</button>
    </div>
    <div class="keyboard-row">
      <button class="key key-special" onclick="delLetter()">⌫</button>
      <button class="key key-space" onclick="add(\' \')">espace</button>
      <button class="key key-special" onclick="clearAll()">✕ Effacer</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-emoji" id="modalEmoji">📖</div>
    <div class="modal-word" id="modalWord"></div>
    <div class="modal-phonetique" id="modalPhonetique"></div>
    <br>
    <button class="btn-listen" onclick="speakWord()">🔊 Écouter</button>
    <button class="btn-close" onclick="closeModal()">Fermer</button>
  </div>
</div>

<script>
// ── ÉTAT ──────────────────────────────────────
var typed = "";
var currentWord = "";
var currentPhonetique = "";
var micActive = false;
var recognition = null;

// ── NORMALISE (retire accents pour comparaison) ──
function normalize(str) {
  return str.toLowerCase()
    .normalize("NFD")
    .replace(/[\\u0300-\\u036f]/g, "")
    .replace(/[^a-z]/g, "");
}

// ── SCORE DE CORRESPONDANCE ───────────────────
function score(input, word) {
  var ni = normalize(input);
  var nw = normalize(word);
  if (nw.startsWith(ni)) return 100 + (100 - nw.length);
  if (nw.includes(ni)) return 50;
  var count = 0;
  for (var i = 0; i < ni.length; i++) {
    if (nw.includes(ni[i])) count++;
  }
  return Math.round((count / Math.max(ni.length, 1)) * 30);
}

// ── SCORE PHONÉTIQUE ──────────────────────────
function scorePhonetic(input, phonetique) {
  if (!phonetique) return 0;
  var ni = normalize(input);
  var np = normalize(phonetique);
  if (np.startsWith(ni)) return 80;
  if (np.includes(ni)) return 40;
  return 0;
}

// ── RECHERCHE ─────────────────────────────────
function search() {
  var container = document.getElementById("wordsList");
  var t = typed.trim();

  if (t.length === 0) {
    container.innerHTML = \'<span class="no-result">Commence à taper pour voir les suggestions...</span>\';
    return;
  }

  var results = words
    .map(function(w) {
      var s = Math.max(score(t, w.w), scorePhonetic(t, w.p));
      return { word: w, score: s };
    })
    .filter(function(r) { return r.score > 10; })
    .sort(function(a, b) { return b.score - a.score; })
    .slice(0, 12);

  if (results.length === 0) {
    container.innerHTML = \'<span class="no-result">Aucun mot trouvé... continue à taper !</span>\';
    return;
  }

  container.innerHTML = results.map(function(r) {
    var w = r.word;
    var emoji = w.e || "📖";
    var mot = w.w;
    var phon = w.p || "";
    return \'<button class="word-card" onclick="showWord(\\\'\'
      + mot.replace(/\\\'/g, "\\\\\'") + \'\\\', \\\'\'
      + emoji + \'\\\', \\\'\'
      + phon.replace(/\\\'/g, "\\\\\'") + \'\\\')">\'
      + \'<span>\'+ emoji +\'</span>\'
      + \'<span>\'+ mot +\'</span>\'
      + (phon ? \'<span class="phonetique-label">\'+ phon +\'</span>\' : \'\')
      + \'<\/button>\';
  }).join("");
}

// ── SAISIE ────────────────────────────────────
function add(letter) {
  typed += letter;
  updateDisplay();
  search();
}

function delLetter() {
  typed = typed.slice(0, -1);
  updateDisplay();
  search();
}

function clearAll() {
  typed = "";
  updateDisplay();
  search();
}

function updateDisplay() {
  var d = document.getElementById("display");
  d.textContent = typed;
  if (typed === "") {
    d.classList.add("empty");
  } else {
    d.classList.remove("empty");
  }
}

// ── CLAVIER PHYSIQUE ──────────────────────────
document.addEventListener("keydown", function(e) {
  if (e.key === "Backspace") { e.preventDefault(); delLetter(); }
  else if (e.key === "Escape") { clearAll(); }
  else if (/^[a-zA-ZÀ-ÿ]$/.test(e.key)) { add(e.key.toLowerCase()); }
});

// ── MODAL ─────────────────────────────────────
function showWord(mot, emoji, phonetique) {
  currentWord = mot;
  currentPhonetique = phonetique || "";
  document.getElementById("modalWord").textContent = mot;
  document.getElementById("modalEmoji").textContent = emoji;
  document.getElementById("modalPhonetique").textContent = phonetique ? "[ " + phonetique + " ]" : "";
  document.getElementById("modal").classList.add("open");
  speakWord();
}

function closeModal(e) {
  if (!e || e.target === document.getElementById("modal") || e.target.classList.contains("btn-close")) {
    document.getElementById("modal").classList.remove("open");
  }
}

// ── SYNTHÈSE VOCALE ───────────────────────────
function speakWord() {
  if (!currentWord) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(currentWord);
  u.lang = "fr-FR";
  u.rate = 0.8;
  speechSynthesis.speak(u);
}

// ── MICRO / DICTÉE ────────────────────────────
function toggleMic() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    alert("La dictée n\'est pas disponible sur ce navigateur. Utilisez Chrome.");
    return;
  }

  if (micActive) {
    recognition.stop();
    return;
  }

  recognition = new SR();
  recognition.lang = "fr-FR";
  recognition.interimResults = false;

  recognition.onstart = function() {
    micActive = true;
    document.getElementById("btnMic").classList.add("active");
  };

  recognition.onresult = function(e) {
    var heard = e.results[0][0].transcript.toLowerCase().trim();
    typed = heard;
    updateDisplay();
    search();
  };

  recognition.onend = function() {
    micActive = false;
    document.getElementById("btnMic").classList.remove("active");
  };

  recognition.start();
}
<\/script>
</body>
</html>'''

with open("index.html", "w", encoding="utf-8") as f:
    f.write(content)

print("index.html generated successfully")
