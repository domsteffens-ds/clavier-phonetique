<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clavier Prédictif</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(160deg, #0a2a6e 0%, #1a4fa8 50%, #0d3b8e 100%);
  min-height: 100vh;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: #fff;
  font-size: 1.8em;
  text-align: center;
  margin-bottom: 15px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  letter-spacing: 2px;
}

#app {
  width: 100%;
  max-width: 620px;
}

#screen-wrap {
  background: #fff;
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

#screen {
  font-size: 2.2em;
  text-align: center;
  min-height: 60px;
  color: #1a3a6e;
  letter-spacing: 6px;
  font-weight: bold;
  word-break: break-all;
}

#screen-hint {
  text-align: center;
  color: rgba(0,0,0,0.3);
  font-size: 0.8em;
  margin-top: 5px;
}

#suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  min-height: 55px;
  padding: 5px;
}

.suggestion {
  background: #fff;
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: 25px;
  padding: 8px 14px;
  color: #1a3a6e;
  font-size: 0.95em;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.suggestion:hover {
  transform: translateY(-2px);
  background: #e8f0ff;
  box-shadow: 0 6px 25px rgba(0,0,0,0.3);
}

.suggestion .emoji { font-size: 1.2em; }
.suggestion .word { font-weight: bold; }

.speak-btn {
  background: rgba(26,58,110,0.15);
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-size: 0.85em;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  color: #1a3a6e;
}
.speak-btn:hover { background: rgba(26,58,110,0.3); }

#actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

#actions button {
  padding: 10px 18px;
  border: none;
  border-radius: 25px;
  font-size: 0.9em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
#actions button:hover { transform: translateY(-2px); }

#btnSpeak { background: #27ae60; color: #fff; }
#btnMic   { background: #e74c3c; color: #fff; }
#btnSave  { background: #f39c12; color: #fff; }
#btnClear { background: #fff; color: #1a3a6e; }

/* CLAVIER */
#keyboard {
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 12px;
  margin-bottom: 12px;
  backdrop-filter: blur(5px);
}

.kb-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
}

.kb-key {
  background: #fff;
  border: none;
  border-radius: 8px;
  width: 52px;
  height: 52px;
  font-size: 1.2em;
  font-weight: bold;
  color: #1a3a6e;
  cursor: pointer;
  box-shadow: 0 3px 8px rgba(0,0,0,0.25);
  transition: all 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.kb-key:hover { background: #e8f0ff; transform: translateY(-1px); }
.kb-key:active { transform: translateY(1px); box-shadow: 0 1px 4px rgba(0,0,0,0.2); }

.kb-key.special {
  background: rgba(255,255,255,0.3);
  color: #fff;
  font-size: 0.85em;
  width: auto;
  padding: 0 12px;
}

.kb-key.space {
  width: 200px;
  background: rgba(255,255,255,0.3);
  color: #fff;
  font-size: 0.85em;
}

#msg {
  text-align: center;
  color: #a8d8ff;
  font-size: 0.9em;
  min-height: 22px;
  margin-bottom: 8px;
}

#saved-words {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 10px;
}

.saved-chip {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 6px 14px;
  color: #fff;
  font-size: 0.9em;
  cursor: pointer;
  transition: background 0.2s;
}
.saved-chip:hover { background: rgba(255,255,255,0.35); }

/* MODAL */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
#modal.open { display: flex; }

#modal-box {
  background: #fff;
  border-radius: 20px;
  padding: 30px;
  width: 90%;
  max-width: 320px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
#modal-box h2 { color: #1a3a6e; margin-bottom: 20px; }

#modal-box input {
  width: 100%;
  padding: 10px 15px;
  border: 2px solid #1a4fa8;
  border-radius: 10px;
  font-size: 1em;
  margin-bottom: 10px;
  color: #1a3a6e;
}

.modal-btns { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
.modal-btns button {
  padding: 10px 25px;
  border: none;
  border-radius: 25px;
  font-size: 1em;
  cursor: pointer;
  font-weight: bold;
}
#btnModalOk { background: #1a4fa8; color: #fff; }
#btnModalCancel { background: #ecf0f1; color: #555; }
</style>
</head>

    </div>
  </div>

  <div id="msg"></div>

</div>

// ══════════════════════════════════════════════
//   APPLICATION
// ══════════════════════════════════════════════
var typed = '';
var motsAjoutes = JSON.parse(localStorage.getItem('motsAjoutes') || '[]');
var tousLesMots = mots.concat(motsAjoutes);

function majEcran() {
  var s = document.getElementById('screen');
  s.textContent = typed ? typed : '|';
}

function add(c) {
  typed += c;
  majEcran();
  afficherSuggestions();
}

function del() {
  if (typed.length > 0) {
    typed = typed.slice(0, -1);
    majEcran();
    afficherSuggestions();
  }
}

function parler(texte) {
  if (!texte.trim()) return;
  var u = new SpeechSynthesisUtterance(texte);
  u.lang = 'fr-FR';
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function dicter() {
  var R = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!R) { alert('Dictée non supportée sur ce navigateur'); return; }
  var r = new R();
  r.lang = 'fr-FR';
  r.onresult = function(e) {
    typed += e.results[0][0].transcript + ' ';
    majEcran();
    afficherSuggestions();
  };
  r.start();
}

function afficherSuggestions() {
  var box = document.getElementById('suggestions');
  box.innerHTML = '';
  var query = typed.trim().toLowerCase();
  var dernier = query.split(' ').pop();
  if (!dernier) return;

  var resultats = tousLesMots.filter(function(m) {
    return m.w.toLowerCase().startsWith(dernier);
  }).slice(0, 8);

  resultats.forEach(function(m) {
    var chip = document.createElement('button');
    chip.className = 'suggestion';

    var emoji = document.createElement('span');
    emoji.className = 'emoji';
    emoji.textContent = m.e || '📝';

    var word = document.createElement('span');
    word.className = 'word';
    word.textContent = m.w;

    var speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn';
    speakBtn.textContent = '🔊';
    speakBtn.title = 'Écouter';
    speakBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      parler(m.w);
    });

    chip.appendChild(emoji);
    chip.appendChild(word);
    chip.appendChild(speakBtn);

    chip.addEventListener('click', function() {
      var mots_avant = typed.trim().split(' ');
      mots_avant.pop();
      typed = (mots_avant.length ? mots_avant.join(' ') + ' ' : '') + m.w + ' ';
      majEcran();
      afficherSuggestions();
    });
    box.appendChild(chip);
  });
}

function ouvrirModal() {
  var m = document.getElementById('modal');
  document.getElementById('modal-mot').value = typed.trim();
  document.getElementById('modal-emoji').value = '';
  m.classList.add('open');
}

function fermerModal() {
  document.getElementById('modal').classList.remove('open');
}

function sauvegarder() {
  var mot = document.getElementById('modal-mot').value.trim();
  if (!mot) return;
  var emoji = document.getElementById('modal-emoji').value.trim() || '📝';
  var nouveau = { w: mot, e: emoji };
  motsAjoutes.push(nouveau);
  tousLesMots.push(nouveau);
  localStorage.setItem('motsAjoutes', JSON.stringify(motsAjoutes));
  fermerModal();
  afficherMotsSauvegardes();
  document.getElementById('msg').textContent = '✅ "' + mot + '" enregistré !';
  setTimeout(function(){ document.getElementById('msg').textContent = ''; }, 3000);
}

function afficherMotsSauvegardes() {
  var box = document.getElementById('saved-words');
  box.innerHTML = '';
  if (motsAjoutes.length === 0) return;
  var titre = document.createElement('p');
  titre.style.cssText = 'color:rgba(255,255,255,0.6);font-size:0.8em;width:100%;text-align:center;margin-bottom:5px;margin-top:10px;';
  titre.textContent = '💾 Mes mots enregistrés :';
  box.appendChild(titre);
  motsAjoutes.forEach(function(m) {
    var chip = document.createElement('span');
    chip.className = 'saved-chip';
    chip.textContent = m.e + ' ' + m.w;
    chip.addEventListener('click', function() {
      typed = m.w + ' ';
      majEcran();
      afficherSuggestions();
    });
    box.appendChild(chip);
  });
}

// Clavier virtuel
document.querySelectorAll('.kb-key').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var k = this.getAttribute('data-k');
    if (k === 'DEL') del();
    else if (k === 'SPACE') add(' ');
    else add(k);
  });
});

// Boutons d'action
document.getElementById('btnSpeak').addEventListener('click', function() { parler(typed); });
document.getElementById('btnMic').addEventListener('click', dicter);
document.getElementById('btnSave').addEventListener('click', ouvrirModal);
document.getElementById('btnClear').addEventListener('click', function() {
  typed = '';
  majEcran();
  afficherSuggestions();
  document.getElementById('msg').textContent = '';
});
document.getElementById('btnModalOk').addEventListener('click', sauvegarder);
document.getElementById('btnModalCancel').addEventListener('click', fermerModal);
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) fermerModal();
});

// Clavier physique
document.addEventListener('keydown', function(e) {
  if (e.key === 'Backspace') { e.preventDefault(); del(); }
  else if (e.key === 'Escape') { typed = ''; majEcran(); afficherSuggestions(); }
  else if (e.key === ' ') { e.preventDefault(); add(' '); }
  else if (/^[a-zA-ZàâäéèêëîïôùûüçÀÂÄÉÈÊËÎÏÔÙÛÜÇ]$/.test(e.key)) {
    add(e.key.toLowerCase());
  }
});

afficherMotsSauvegardes();
majEcran();
</script>
