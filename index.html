<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clavier Phonétique</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 10px; }
  h1 { text-align: center; color: #2c3e50; padding: 15px; font-size: 1.4em; }
  
  .search-box {
    display: flex; gap: 10px; margin: 10px auto;
    max-width: 600px; padding: 10px;
  }
  #searchInput {
    flex: 1; padding: 12px; font-size: 1.1em;
    border: 2px solid #3498db; border-radius: 8px;
    outline: none;
  }
  #searchInput:focus { border-color: #e74c3c; }
  
  .hint {
    text-align: center; color: #7f8c8d; font-size: 0.9em;
    margin-bottom: 10px;
  }

  #results {
    max-width: 900px; margin: 0 auto;
    display: flex; flex-wrap: wrap; gap: 10px;
    padding: 10px; justify-content: center;
  }

  .word-card {
    background: white; border-radius: 12px;
    padding: 15px 20px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: all 0.2s;
    text-align: center; min-width: 120px;
  }
  .word-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
  .word-card .emoji { font-size: 2em; display: block; margin-bottom: 5px; }
  .word-card .word { font-size: 1.1em; font-weight: bold; color: #2c3e50; }
  .word-card .phonetic { font-size: 0.8em; color: #7f8c8d; margin-top: 3px; }

  .sound-section { max-width: 900px; margin: 15px auto; }
  .sound-btn {
    display: inline-block; margin: 5px;
    padding: 8px 15px; background: #3498db;
    color: white; border-radius: 20px;
    cursor: pointer; font-size: 0.95em;
    transition: background 0.2s;
  }
  .sound-btn:hover { background: #e74c3c; }

  .no-result {
    text-align: center; color: #e74c3c;
    font-size: 1.1em; padding: 20px; width: 100%;
  }

  #speakBtn {
    padding: 10px 20px; background: #27ae60;
    color: white; border: none; border-radius: 8px;
    font-size: 1em; cursor: pointer;
  }
  #speakBtn:hover { background: #219a52; }
</style>
</head>
<body>

<h1>🔤 Clavier Phonétique Français</h1>

<div class="hint">Écris le mot comme tu l'entends → trouve l'orthographe correcte !</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Ex: alo, bonjur, mazon..." 
         oninput="searchWord()" autocomplete="off" />
  <button id="speakBtn" onclick="speakCurrent()">🔊 Écouter</button>
</div>

<div class="sound-section">
  <strong>Sons :</strong>
  <span class="sound-btn" onclick="filterBySound('o')">O (o, eau, au)</span>
  <span class="sound-btn" onclick="filterBySound('é')">É (é, er, ez)</span>
  <span class="sound-btn" onclick="filterBySound('è')">È (è, ai, ei)</span>
  <span class="sound-btn" onclick="filterBySound('an')">AN (an, en, am)</span>
  <span class="sound-btn" onclick="filterBySound('in')">IN (in, ain, ein)</span>
  <span class="sound-btn" onclick="filterBySound('on')">ON (on, om)</span>
  <span class="sound-btn" onclick="filterBySound('ou')">OU</span>
  <span class="sound-btn" onclick="filterBySound('u')">U</span>
  <span class="sound-btn" onclick="filterBySound('s')">S (s, ss, c, ç)</span>
  <span class="sound-btn" onclick="filterBySound('f')">F (f, ph)</span>
  <span class="sound-btn" onclick="filterBySound('k')">K (k, c, qu)</span>
  <span class="sound-btn" onclick="filterBySound('j')">J (j, ge)</span>
  <span class="sound-btn" onclick="filterBySound('g')">G dur (g, gu)</span>
  <span class="sound-btn" onclick="filterBySound('z')">Z (z, s)</span>
  <span class="sound-btn" onclick="filterBySound('wa')">OI / OUA</span>
  <span class="sound-btn" onclick="filterBySound('ill')">ILL (ill, il)</span>
  <span class="sound-btn" onclick="filterBySound('all')">Tout</span>
</div>

<div id="results"></div>

// Correspondances phonétiques
const phoneticMap = [
  // Sons complexes en premier
  ["eau","o"],["au","o"],["ai","é"],["ei","é"],
  ["an","an"],["en","an"],["am","an"],["em","an"],
  ["in","in"],["ain","in"],["ein","in"],["im","in"],
  ["on","on"],["om","on"],
  ["ou","ou"],["oi","wa"],["oy","way"],
  ["ph","f"],["ch","sh"],
  ["gn","ny"],["qu","k"],["gu","g"],
  ["ill","iy"],["ail","ay"],["eil","ey"],["euil","euy"],
  ["ss","s"],["sc","s"],["ç","s"],["ce","se"],["ci","si"],
  ["ge","je"],["gi","ji"],
  ["er","é"],["ez","é"],["et","é"],["ée","é"],
  ["eu","eu"],["œ","eu"],
  ["x","ks"],
  ["c","k"],["k","k"],
  ["z","z"],["s","s"],
  ["y","i"],
];

function normalize(str) {
  let s = str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .trim();
  // Appliquer les correspondances
  for(let [from, to] of phoneticMap) {
    s = s.split(from).join(to);
  }
  return s;
}

let currentWords = [];

function searchWord() {
  const input = document.getElementById('searchInput').value;
  if(input.length === 0) {
    document.getElementById('results').innerHTML = '';
    return;
  }
  
  const normInput = normalize(input);
  
  const results = words.filter(item => {
    const normWord = normalize(item.w);
    const normPhonetic = normalize(item.p);
    return normWord.includes(normInput) || 
           normPhonetic.includes(normInput) ||
           normInput.includes(normPhonetic.substring(0,3));
  });

  currentWords = results;
  displayResults(results);
}

function filterBySound(sound) {
  if(sound === 'all') {
    displayResults(words);
    currentWords = words;
    return;
  }
  
  const soundMap = {
    'o': ['eau','au','ô','o'],
    'é': ['er','ez','é','ee','ée'],
    'è': ['è','ai','ei','ê'],
    'an': ['an','en','am','em'],
    'in': ['in','ain','ein','im','yn'],
    'on': ['on','om'],
    'ou': ['ou'],
    'u': ['u','û'],
    's': ['ss','sc','ç','c','s'],
    'f': ['ph','f'],
    'k': ['qu','k','c'],
    'j': ['j','ge','gi'],
    'g': ['gu','g'],
    'z': ['z','s'],
    'wa': ['oi','oy'],
    'ill': ['ill','il','ail','eil'],
  };
  
  const patterns = soundMap[sound] || [];
  const results = words.filter(item => 
    patterns.some(p => item.w.includes(p))
  );
  currentWords = results;
  displayResults(results);
}

function displayResults(results) {
  const div = document.getElementById('results');
  if(results.length === 0) {
    div.innerHTML = '<div class="no-result">😕 Aucun mot trouvé... Essaie autrement !</div>';
    return;
  }
  
  div.innerHTML = results.map(item => `
    <div class="word-card" onclick="speak('${item.w}')">
      ${item.e ? `<span class="emoji">${item.e}</span>` : ''}
      <div class="word">${item.w}</div>
      <div class="phonetic">${item.p}</div>
    </div>
  `).join('');
}

function speak(word) {
  const utterance = new SpeechSynthesisUtterance(word);
  utterance.lang = 'fr-FR';
  utterance.rate = 0.8;
  speechSynthesis.speak(utterance);
}

function speakCurrent() {
  const input = document.getElementById('searchInput').value;
  if(input) speak(input);
}

// Afficher tous les mots au démarrage
displayResults(words.slice(0,50));
