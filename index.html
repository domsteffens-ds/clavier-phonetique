}

// ============================================
// MOTEUR PHONÉTIQUE
// ============================================

// Table de conversion phonétique
// L'élève tape → on normalise en "son"
function normaliserPhon(texte) {
  let s = texte.toLowerCase();
  
  // Digraphes et trigraphes d'abord !
  s = s.replace(/eau/g, "o");
  s = s.replace(/ain|aim|ein|eim/g, "in");
  s = s.replace(/an|am|en|em/g, "an");
  s = s.replace(/on|om/g, "on");
  s = s.replace(/ou/g, "ou");
  s = s.replace(/oi/g, "oa");
  s = s.replace(/au/g, "o");
  s = s.replace(/eu|oeu/g, "eu");
  s = s.replace(/ph/g, "f");
  s = s.replace(/ch/g, "ch");
  s = s.replace(/gn/g, "ny");
  s = s.replace(/qu|ck/g, "k");
  s = s.replace(/ill|il$/g, "y");
  s = s.replace(/ail|eil|euil|ouil/g, "y");
  
  // Lettres simples
  s = s.replace(/[éèêë]/g, "e");
  s = s.replace(/[àâ]/g, "a");
  s = s.replace(/[îï]/g, "i");
  s = s.replace(/[ôö]/g, "o");
  s = s.replace(/[ûü]/g, "u");
  s = s.replace(/ç/g, "s");
  s = s.replace(/[sz]$/g, "");   // lettres muettes finales
  s = s.replace(/[td]$/g, "");
  s = s.replace(/[x]$/g, "");
  s = s.replace(/c([aou])/g, "k$1");
  s = s.replace(/c([ei])/g, "s$1");
  s = s.replace(/g([ei])/g, "j$1");
  s = s.replace(/y/g, "i");
  s = s.replace(/w/g, "v");
  
  return s;
}

function calculerScore(saisieNorm, motPhon) {
  // Score basé sur combien de caractères correspondent au début
  const minLen = Math.min(saisieNorm.length, motPhon.length);
  let score = 0;
  
  for (let i = 0; i < minLen; i++) {
    if (saisieNorm[i] === motPhon[i]) {
      score += (i === 0) ? 3 : 1; // Premier caractère vaut plus
    } else {
      break;
    }
  }
  
  // Bonus si la longueur est similaire
  const diffLen = Math.abs(saisieNorm.length - motPhon.length);
  if (diffLen <= 1) score += 2;
  if (diffLen === 0) score += 1;
  
  // Bonus si contient la saisie
  if (motPhon.startsWith(saisieNorm)) score += 5;
  if (motPhon.includes(saisieNorm)) score += 2;
  
  return score;
}

function chercherMots(saisie) {
  if (saisie.length < 1) return [];
  
  const saisieNorm = normaliserPhon(saisie);
  
  const resultats = MOTS
    .map(m => ({
      ...m,
      score: calculerScore(saisieNorm, m.phon)
    }))
    .filter(m => m.score > 2)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12);
  
  return resultats;
}

  const titre = document.getElementById('resultatsTitre');
  
  if (saisie.length === 0) {
    grille.innerHTML = `<div class="msg-accueil"><span>⌨️</span>Commence à taper un mot !</div>`;
    titre.textContent = "";
    return;
  }
  
  const mots = chercherMots(saisie);
  
  if (mots.length === 0) {
    grille.innerHTML = `<div class="msg-accueil"><span>🤔</span>Aucun mot trouvé... Essaie autrement !</div>`;
    titre.textContent = "";
    return;
  }
  
  titre.textContent = `✨ ${mots.length} mot(s) trouvé(s) — Clique pour entendre !`;
  grille.innerHTML = "";
  
  mots.forEach((m, i) => {
    const carte = document.createElement('div');
    carte.className = 'carte-mot';
    carte.style.animationDelay = (i * 0.05) + 's';
    carte.innerHTML = `
      <span class="carte-emoji">${m.emoji}</span>
      <span class="carte-texte">${m.mot}</span>
      <span class="carte-syllabe">${m.def}</span>
      <span class="badge">🔊 écouter</span>
    `;
    carte.onclick = () => {
      prononcerMot(m.mot, carte);
    };
    grille.appendChild(carte);
  });
}

function ajouterLettre(lettre) {
  if (saisie.length < 20) {
    saisie += lettre;
    mettreAJour();
  }
}

function supprimerLettre() {
  saisie = saisie.slice(0, -1);
  mettreAJour();
}

function toutEffacer() {
  saisie = "";
  mettreAJour();
}

function prononcerMot(mot, carte) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(mot);
    u.lang = 'fr-FR';
    u.rate = 0.75;
    u.pitch = 1.1;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
    
    if (carte) {
      carte.classList.add('joue');
      setTimeout(() => carte.classList.remove('joue'), 1500);
    }
  }
}

// Clavier physique
document.addEventListener('keydown', (e) => {
  const touche = e.key.toLowerCase();
  if (/^[a-z]$/.test(touche)) {
    ajouterLettre(touche);
  } else if (e.key === 'Backspace') {
    supprimerLettre();
  } else if (e.key === 'Escape') {
    toutEffacer();
  }
});

// Init
mettreAJour();
</script>
</body>
</html>
