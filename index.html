<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial; background: #667eea; padding: 15px; min-height: 100vh; }

#screen {
  background: white; border-radius: 12px; padding: 15px;
  font-size: 2em; text-align: center; min-height: 70px;
  margin-bottom: 10px; letter-spacing: 4px; color: #333;
}

#suggestions {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-bottom: 10px; min-height: 50px;
}

.suggestion {
  background: white; border: none; border-radius: 20px;
  padding: 8px 15px; font-size: 1.1em; cursor: pointer;
  box-shadow: 0 3px 0 #aaa; transition: transform 0.1s;
}
.suggestion:active { transform: translateY(2px); box-shadow: 0 1px 0 #aaa; }

#actions {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 10px;
}
#actions button {
  padding: 10px 18px; border: none; border-radius: 20px;
  font-size: 1em; cursor: pointer; font-weight: bold;
}
#btnMic { background: #ff6b6b; color: white; }
#btnAdd { background: #51cf66; color: white; }

.row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
.k {
  width: 55px; height: 55px; font-size: 1.2em; font-weight: bold;
  border: none; border-radius: 8px; background: white;
  cursor: pointer; box-shadow: 0 4px 0 #aaa;
}
.k:active { transform: translateY(3px); box-shadow: 0 1px 0 #aaa; }
.k-wide { width: 85px; font-size: 0.95em; }

#msg { color: white; text-align: center; margin-top: 8px; font-size: 1em; min-height: 25px; }
</style>
</head>

// Mots ajoutés par l'élève
var motsAjoutes = JSON.parse(localStorage.getItem('motsAjoutes') || '[]');
var tousLesMots = mots.concat(motsAjoutes);

var typed = '';

function add(l) {
  typed += l;
  maj();
}

function del() {
  typed = typed.slice(0, -1);
  maj();
}

function clear2() {
  typed = '';
  maj();
}

function maj() {
  document.getElementById('screen').textContent = typed || '|';
  afficherSuggestions();
}

function afficherSuggestions() {
  var div = document.getElementById('suggestions');
  div.innerHTML = '';
  if (typed.length === 0) return;

  var t = typed.toLowerCase();
  var resultats = tousLesMots.filter(function(w) {
    return w.w.toLowerCase().startsWith(t);
  }).slice(0, 8);

  if (resultats.length === 0) {
    div.innerHTML = '<span style="color:white;font-size:0.9em">Aucun mot — utilisez ➕ pour ajouter</span>';
    return;
  }

  resultats.forEach(function(item) {
    var btn = document.createElement('button');
    btn.className = 'suggestion';
    btn.textContent = item.e + ' ' + item.w;
    btn.onclick = function() {
      typed = item.w;
      maj();
      parler(item.w);
      document.getElementById('msg').textContent = '✅ ' + item.w;
    };
    div.appendChild(btn);
  });
}

function parler(texte) {
  if ('speechSynthesis' in window) {
    var u = new SpeechSynthesisUtterance(texte);
    u.lang = 'fr-FR';
    speechSynthesis.speak(u);
  }
}

function dicter() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    document.getElementById('msg').textContent = '❌ Micro non supporté';
    return;
  }
  var R = window.SpeechRecognition || window.webkitSpeechRecognition;
  var r = new R();
  r.lang = 'fr-FR';
  r.onstart = function() { document.getElementById('msg').textContent = '🎤 Parlez...'; };
  r.onresult = function(e) {
    typed = e.results[0][0].transcript.toLowerCase().replace(/\s+/g,'');
    maj();
    document.getElementById('msg').textContent = '✅ Entendu : ' + typed;
  };
  r.onerror = function() { document.getElementById('msg').textContent = '❌ Erreur micro'; };
  r.start();
}

function ajouterMot() {
  if (typed.length === 0) {
    document.getElementById('msg').textContent = '⚠️ Tapez un mot d\'abord';
    return;
  }
  var emoji = prompt('Quel emoji pour "' + typed + '" ?', '📝');
  if (emoji === null) return;
  var nouveau = { w: typed, e: emoji || '📝', p: typed, n: 'P1' };
  motsAjoutes.push(nouveau);
  tousLesMots.push(nouveau);
  localStorage.setItem('motsAjoutes', JSON.stringify(motsAjoutes));
  document.getElementById('msg').textContent = '✅ "' + typed + '" ajouté !';
  afficherSuggestions();
}
